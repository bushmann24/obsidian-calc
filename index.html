<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Shared Vault</title>
    <style>
        :root {
            --obsidian-primary: #8b5cf6;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --label: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container { width: 100%; max-width: 450px; padding-bottom: 50px; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--obsidian-primary); margin: 0; font-size: 2rem; }
        
        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        label { display: block; font-size: 0.85rem; color: var(--label); margin: 15px 0 5px 0; font-weight: bold; text-transform: uppercase; }
        label:first-child { margin-top: 0; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: var(--bg);
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        
        .live-math {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #334155;
        }
        .math-stat { color: var(--label); font-size: 0.9rem; }
        .math-val { font-size: 1.2rem; font-weight: bold; color: white; }
        .profit-val { font-size: 1.5rem; font-weight: bold; color: var(--success); }
        
        button {
            width: 100%;
            padding: 15px;
            background: var(--obsidian-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
        
        /* The Vault List */
        .vault-title { font-size: 1.2rem; color: var(--label); border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px; }
        .vault-item {
            background: #151e2e;
            border-left: 4px solid var(--obsidian-primary);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .item-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .item-name { font-weight: bold; font-size: 1.1rem; }
        .item-buyer { font-size: 0.75rem; background: #334155; padding: 3px 8px; border-radius: 12px; }
        
        .item-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--label); margin-bottom: 4px; }
        .item-row span:last-child { color: white; font-weight: bold; }
        .item-profit { font-size: 1.2rem; font-weight: bold; text-align: right; color: var(--success); margin-top: 10px; }
        
        .status-toggle {
            background: transparent; border: 1px solid var(--label); color: var(--label);
            padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; width: auto; margin-top: 10px;
            cursor: pointer;
        }
        .status-toggle.sold { background: var(--success); color: #0f172a; border: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Obsidian Vault</h1>
        <p style="color: var(--label); margin-top: 5px;">Shared Card Tracker</p>
    </div>

    <div class="card">
        <label>Card Name</label>
        <input type="text" id="cardName" placeholder="e.g. Base Set Charizard">
        
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Buy Price</label>
                <input type="number" id="buyPrice" placeholder="$0.00" oninput="calculate()">
            </div>
            <div style="flex: 1;">
                <label>Collectr Value</label>
                <input type="number" id="collectrPrice" placeholder="$0.00" oninput="calculate()">
            </div>
        </div>

        <label>Who Bought It?</label>
        <select id="buyerName">
            <option value="Me">Me</option>
            <option value="Friend">Friend</option>
        </select>

        <div class="live-math">
            <span class="math-stat">Payout (85%)</span>
            <span class="math-val" id="previewPayout">$0.00</span>
        </div>
        <div class="live-math" style="border: none; padding-top: 5px;">
            <span class="math-stat">Net Profit</span>
            <span class="profit-val" id="previewProfit">$0.00</span>
        </div>

        <button onclick="logToVault()">+ Add to Vault</button>
    </div>

    <div class="vault-title">The Vault Collection</div>
    <div id="vaultList">
        <p style="text-align: center; color: #334155;">Loading shared vault...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    // Your specific Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAFBXf5X9_F8EzO7jj4zW8WIbOC3LIJHO8",
        authDomain: "obsidian-calculator-3468f.firebaseapp.com",
        projectId: "obsidian-calculator-3468f",
        storageBucket: "obsidian-calculator-3468f.firebasestorage.app",
        messagingSenderId: "184324140376",
        appId: "1:184324140376:web:9dd100bb9acdef0add892d"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const vaultCollection = collection(db, "obsidian_cards");

    // --- LIVE CALCULATOR LOGIC ---
    window.calculate = function() {
        const buy = parseFloat(document.getElementById('buyPrice').value) || 0;
        const collectr = parseFloat(document.getElementById('collectrPrice').value) || 0;
        
        const payout = collectr * 0.85;
        const profit = payout - buy;

        document.getElementById('previewPayout').innerText = `$${payout.toFixed(2)}`;
        
        const profitEl = document.getElementById('previewProfit');
        profitEl.innerText = `${profit >= 0 ? '+' : '-'}$${Math.abs(profit).toFixed(2)}`;
        profitEl.style.color = profit >= 0 ? 'var(--success)' : 'var(--danger)';
    };

    // --- ADD TO FIREBASE ---
    window.logToVault = async function() {
        const name = document.getElementById('cardName').value;
        const buy = parseFloat(document.getElementById('buyPrice').value);
        const collectr = parseFloat(document.getElementById('collectrPrice').value);
        const buyer = document.getElementById('buyerName').value;

        if (!name || !buy || !collectr) return alert("Please fill out all fields!");

        const payout = collectr * 0.85;
        const profit = payout - buy;

        // Save to cloud
        await addDoc(vaultCollection, {
            name: name,
            buyPrice: buy,
            collectrPrice: collectr,
            payout: payout,
            profit: profit,
            buyer: buyer,
            status: "In Hand",
            dateAdded: new Date().toLocaleDateString(),
            timestamp: Date.now()
        });

        // Clear form
        document.getElementById('cardName').value = '';
        document.getElementById('buyPrice').value = '';
        document.getElementById('collectrPrice').value = '';
        window.calculate();
    };

    // --- REAL-TIME SYNC (READ FROM FIREBASE) ---
    const q = query(vaultCollection, orderBy("timestamp", "desc"));
    
    onSnapshot(q, (snapshot) => {
        const listEl = document.getElementById('vaultList');
        listEl.innerHTML = ''; // Clear current list

        if (snapshot.empty) {
            listEl.innerHTML = '<p style="text-align:center; color:#64748b;">Vault is empty. Add a card!</p>';
            return;
        }

        snapshot.forEach((docSnapshot) => {
            const data = docSnapshot.data();
            const id = docSnapshot.id;
            
            const isSold = data.status === "Sold";
            const btnClass = isSold ? "status-toggle sold" : "status-toggle";
            const btnText = isSold ? "✓ Sold to Obsidian" : "In Hand";

            listEl.innerHTML += `
                <div class="vault-item" style="opacity: ${isSold ? '0.6' : '1'}">
                    <div class="item-head">
                        <span class="item-name">${data.name}</span>
                        <span class="item-buyer">${data.buyer} • ${data.dateAdded}</span>
                    </div>
                    <div class="item-row"><span>Buy Price:</span> <span>$${data.buyPrice.toFixed(2)}</span></div>
                    <div class="item-row"><span>Collectr Value:</span> <span>$${data.collectrPrice.toFixed(2)}</span></div>
                    <div class="item-row"><span>85% Payout:</span> <span>$${data.payout.toFixed(2)}</span></div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <button class="${btnClass}" onclick="toggleStatus('${id}', '${data.status}')">${btnText}</button>
                        <div class="item-profit">+$${data.profit.toFixed(2)}</div>
                    </div>
                </div>
            `;
        });
    });

    // --- UPDATE STATUS IN FIREBASE ---
    window.toggleStatus = async function(id, currentStatus) {
        const newStatus = currentStatus === "In Hand" ? "Sold" : "In Hand";
        const cardRef = doc(db, "obsidian_cards", id);
        await updateDoc(cardRef, { status: newStatus });
    };

</script>
</body>
</html>
