<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Calc</title>
    <style>
        /* Mobile App Styling */
        :root {
            --obsidian-primary: #8b5cf6;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --label: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
        }

        /* Dashboard Header */
        .dashboard {
            background: var(--obsidian-primary);
            color: white;
            padding: 25px 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }
        .dashboard h1 { margin: 0; font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }

        /* Calculator Card */
        .card {
            background: var(--card);
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        label { 
            display: block; 
            font-size: 0.85rem; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: var(--label); 
            margin-top: 15px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        label:first-child { margin-top: 0; }
        
        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #334155;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1.1rem;
            background: #0f172a;
            color: white;
            font-weight: 600;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--obsidian-primary);
        }

        /* Live Results Section */
        .live-results {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #334155;
        }
        .item-stats {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            margin-bottom: 10px;
            align-items: center;
        }
        .item-stats span:first-child {
            color: var(--label);
            font-weight: 500;
        }
        #obsPayoutDisplay {
            font-size: 1.2rem;
            color: white;
            font-weight: 700;
        }
        
        .profit-container {
            text-align: right;
            margin-top: 15px;
        }
        .profit-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--label);
            font-weight: 700;
            margin-bottom: 5px;
        }
        .profit {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1px;
        }
        .profit.positive { color: var(--success); }
        .profit.negative { color: var(--danger); }
        .profit.neutral { color: white; }

    </style>
</head>
<body>

<div class="app-container">
    
    <div class="dashboard">
        <h1>Obsidian Calc</h1>
    </div>

    <div class="card">
        <label>Buy Price</label>
        <input type="number" id="obsBuy" placeholder="$ 0.00" step="0.01" oninput="calculateObsidian()">
        
        <label>Collectr Value</label>
        <input type="number" id="obsCollectr" placeholder="$ 0.00" step="0.01" oninput="calculateObsidian()">

        <div class="live-results">
            <div class="item-stats">
                <span>Obsidian Payout (85%)</span> 
                <span id="obsPayoutDisplay">$0.00</span>
            </div>
            
            <div class="profit-container">
                <div class="profit-label">Net Profit</div>
                <div class="profit neutral" id="obsProfitDisplay">$0.00</div>
            </div>
        </div>
    </div>

</div>

<script>
    function calculateObsidian() {
        const buyInput = document.getElementById('obsBuy').value;
        const collectrInput = document.getElementById('obsCollectr').value;

        const buy = parseFloat(buyInput) || 0;
        const collectr = parseFloat(collectrInput) || 0;

        // The Math
        const payout = collectr * 0.85; // 85% of Collectr
        const profit = payout - buy;

        // Update Payout UI
        document.getElementById('obsPayoutDisplay').innerText = `$${payout.toFixed(2)}`;
        
        // Update Profit UI
        const profitDisplay = document.getElementById('obsProfitDisplay');
        
        if (!buyInput && !collectrInput) {
            profitDisplay.className = 'profit neutral';
            profitDisplay.innerText = '$0.00';
            return;
        }

        const isPositive = profit >= 0;
        profitDisplay.className = `profit ${isPositive ? 'positive' : 'negative'}`;
        profitDisplay.innerText = `${isPositive ? '+' : '-'}$${Math.abs(profit).toFixed(2)}`;
    }
</script>

</body>
</html>
