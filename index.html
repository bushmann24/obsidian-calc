<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Calculator</title>
    <style>
        :root {
            --obsidian-primary: #8b5cf6;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --label: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container { width: 100%; max-width: 450px; padding-bottom: 50px; }
        
        /* Header & Plus Button */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header-top h1 { color: var(--obsidian-primary); margin: 0; font-size: 1.6rem; }
        .add-btn {
            width: 40px;
            height: 40px;
            background: var(--obsidian-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        label { display: block; font-size: 0.85rem; color: var(--label); margin: 15px 0 5px 0; font-weight: bold; text-transform: uppercase; }
        label:first-child { margin-top: 0; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: var(--bg);
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            font-weight: 600;
        }
        input:focus { outline: none; border-color: var(--obsidian-primary); }
        
        .live-math {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #334155;
        }
        .math-stat { color: var(--label); font-size: 0.9rem; font-weight: 600; }
        .math-val { font-size: 1.2rem; font-weight: bold; color: white; }
        
        .profit-container { text-align: right; margin-top: 15px; }
        .profit-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--label); font-weight: 700; margin-bottom: 5px; }
        .profit-val { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; }
        .profit-val.positive { color: var(--success); }
        .profit-val.negative { color: var(--danger); }
        .profit-val.neutral { color: white; }
        
        button.action-btn {
            width: 100%;
            padding: 15px;
            background: var(--obsidian-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
        }
        button.cancel-btn { background: #334155; margin-top: 10px; }
        
        /* Modal Overlays */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Custom Alert Notification */
        #customAlert {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--obsidian-primary);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: bold;
            z-index: 2000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
            min-width: 200px;
        }

        /* The Vault List */
        .vault-title { font-size: 1.2rem; color: var(--label); border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px; font-weight: 600;}
        .vault-item {
            background: #151e2e;
            border-left: 4px solid var(--obsidian-primary);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .item-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .item-name { font-weight: bold; font-size: 1.1rem; }
        .item-buyer { font-size: 0.75rem; background: #334155; padding: 3px 8px; border-radius: 12px; color: #cbd5e1; }
        
        .item-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--label); margin-bottom: 4px; }
        .item-row span:last-child { color: white; font-weight: bold; }
        .item-profit { font-size: 1.2rem; font-weight: bold; text-align: right; margin-top: 10px; }
        
        .status-toggle {
            background: transparent; border: 1px solid var(--label); color: var(--label);
            padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; width: auto; margin-top: 10px;
            cursor: pointer; font-weight: 600;
        }
        .status-toggle.sold { background: var(--success); color: #0f172a; border: none; }
    </style>
</head>
<body>

<div id="customAlert"></div>

<div class="modal-overlay" id="loginModal">
    <div class="card" style="width: 100%; max-width: 380px; margin: auto; text-align: center;">
        <h2 style="margin-top: 0; color: var(--obsidian-primary);">Obsidian Calculator</h2>
        <p style="color: var(--label); font-size: 0.9rem; margin-bottom: 20px;">Username Below</p>
        
        <input type="text" id="usernameInput" placeholder="Username" style="text-align: center;">
        <button class="action-btn" id="loginBtn" onclick="handleLogin()">Login</button>
    </div>
</div>

<div class="app-container" id="mainApp" style="display: none;">
    <div class="header-top">
        <h1>Obsidian Calculator</h1>
        <button class="add-btn" onclick="openModal()">+</button>
    </div>

    <div class="card">
        <label>Buy Price</label>
        <input type="number" id="buyPrice" placeholder="$0.00" step="0.01" oninput="calculate()">
        
        <label>Collectr Value</label>
        <input type="number" id="collectrPrice" placeholder="$0.00" step="0.01" oninput="calculate()">

        <div class="live-math">
            <span class="math-stat">Obsidian Payout (85%)</span>
            <span class="math-val" id="previewPayout">$0.00</span>
        </div>
        
        <div class="profit-container">
            <div class="profit-label">Net Profit</div>
            <div class="profit-val neutral" id="previewProfit">$0.00</div>
        </div>
    </div>

    <div class="vault-title">Collection</div>
    <div id="vaultList">
        <p style="text-align: center; color: #334155;">Loading data...</p>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="card" style="width: 100%; max-width: 380px; margin: auto;">
        <h2 style="margin-top: 0; color: white;">Add to List</h2>
        
        <label>Purchase Date</label>
        <input type="date" id="modalDate">

        <label>Item Name</label>
        <input type="text" id="modalName" placeholder="e.g. Charizard">
        
        <label>Buy Price</label>
        <input type="number" id="modalBuy" placeholder="$0.00" step="0.01">

        <label>Collectr Value</label>
        <input type="number" id="modalCollectr" placeholder="$0.00" step="0.01">
        
        <button class="action-btn" onclick="logToVault()">Add to List</button>
        <button class="action-btn cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, setDoc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAFBXf5X9_F8EzO7jj4zW8WIbOC3LIJHO8",
        authDomain: "obsidian-calculator-3468f.firebaseapp.com",
        projectId: "obsidian-calculator-3468f",
        storageBucket: "obsidian-calculator-3468f.firebasestorage.app",
        messagingSenderId: "184324140376",
        appId: "1:184324140376:web:9dd100bb9acdef0add892d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const vaultCollection = collection(db, "obsidian_cards");

    // --- CUSTOM ALERT LOGIC ---
    let alertTimeout;
    window.showAlert = function(message) {
        const alertBox = document.getElementById('customAlert');
        alertBox.innerText = message;
        alertBox.style.display = 'block';
        clearTimeout(alertTimeout);
        alertTimeout = setTimeout(() => {
            alertBox.style.display = 'none';
        }, 3000);
    };

    // --- USER LOGIN LOGIC ---
    let currentUser = localStorage.getItem('obsidian_username');

    if (currentUser) {
        document.getElementById('mainApp').style.display = 'block';
    } else {
        document.getElementById('loginModal').style.display = 'flex';
    }

    window.handleLogin = async function() {
        const inputName = document.getElementById('usernameInput').value.trim();
        if (!inputName) return showAlert("Please enter a username");

        const btn = document.getElementById('loginBtn');
        btn.innerText = "Loading...";

        const userKey = inputName.toLowerCase();
        const userRef = doc(db, "obsidian_users", userKey);
        
        try {
            const userDoc = await getDoc(userRef);
            
            if (userDoc.exists()) {
                showAlert(`Welcome back, ${inputName}`);
            } else {
                await setDoc(userRef, {
                    username: inputName,
                    registeredAt: Date.now()
                });
                showAlert(`Registered user: ${inputName}`);
            }

            localStorage.setItem('obsidian_username', inputName);
            currentUser = inputName;
            
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';

        } catch (error) {
            showAlert("Connection error");
            btn.innerText = "Login";
        }
    };

    // --- LIVE CALCULATOR LOGIC ---
    window.calculate = function() {
        const buyInput = document.getElementById('buyPrice').value;
        const collectrInput = document.getElementById('collectrPrice').value;

        const buy = parseFloat(buyInput) || 0;
        const collectr = parseFloat(collectrInput) || 0;
        
        const payout = collectr * 0.85;
        const profit = payout - buy;

        document.getElementById('previewPayout').innerText = `$${payout.toFixed(2)}`;
        
        const profitEl = document.getElementById('previewProfit');
        
        if (!buyInput && !collectrInput) {
            profitEl.className = 'profit-val neutral';
            profitEl.innerText = '$0.00';
            return;
        }

        const isPositive = profit >= 0;
        profitEl.className = `profit-val ${isPositive ? 'positive' : 'negative'}`;
        profitEl.innerText = `${isPositive ? '+' : '-'}$${Math.abs(profit).toFixed(2)}`;
    };

    // --- MODAL LOGIC FOR ADDING CARDS ---
    window.openModal = function() {
        document.getElementById('addModal').style.display = 'flex';
        // Set date input to today by default
        document.getElementById('modalDate').valueAsDate = new Date();
    };

    window.closeModal = function() {
        document.getElementById('addModal').style.display = 'none';
        document.getElementById('modalName').value = '';
        document.getElementById('modalBuy').value = '';
        document.getElementById('modalCollectr').value = '';
    };

    // --- ADD CARD TO FIREBASE ---
    window.logToVault = async function() {
        const date = document.getElementById('modalDate').value;
        const name = document.getElementById('modalName').value.trim();
        const buyInput = document.getElementById('modalBuy').value;
        const collectrInput = document.getElementById('modalCollectr').value;

        if (!date || !name || !buyInput || !collectrInput) {
            return showAlert("Please fill out all fields");
        }

        const buy = parseFloat(buyInput);
        const collectr = parseFloat(collectrInput);
        const payout = collectr * 0.85;
        const profit = payout - buy;

        await addDoc(vaultCollection, {
            name: name,
            buyPrice: buy,
            collectrPrice: collectr,
            payout: payout,
            profit: profit,
            buyer: currentUser,
            status: "In Hand",
            dateAdded: date,
            timestamp: Date.now()
        });

        closeModal();
        showAlert("Added to list");
    };

    // --- REAL-TIME SYNC (READ CARDS FROM FIREBASE) ---
    const q = query(vaultCollection, orderBy("timestamp", "desc"));
    
    onSnapshot(q, (snapshot) => {
        const listEl = document.getElementById('vaultList');
        listEl.innerHTML = ''; 

        if (snapshot.empty) {
            listEl.innerHTML = '<p style="text-align:center; color:#64748b;">List is empty.</p>';
            return;
        }

        snapshot.forEach((docSnapshot) => {
            const data = docSnapshot.data();
            const id = docSnapshot.id;
            
            const isSold = data.status === "Sold";
            const btnClass = isSold ? "status-toggle sold" : "status-toggle";
            const btnText = isSold ? "✓ Sold" : "In Hand";
            
            const isPositive = data.profit >= 0;
            const profitColor = isPositive ? "var(--success)" : "var(--danger)";

            listEl.innerHTML += `
                <div class="vault-item" style="opacity: ${isSold ? '0.6' : '1'}">
                    <div class="item-head">
                        <span class="item-name">${data.name}</span>
                        <span class="item-buyer">${data.buyer} • ${data.dateAdded}</span>
                    </div>
                    <div class="item-row"><span>Buy Price:</span> <span>$${data.buyPrice.toFixed(2)}</span></div>
                    <div class="item-row"><span>Collectr Value:</span> <span>$${data.collectrPrice.toFixed(2)}</span></div>
                    <div class="item-row"><span>85% Payout:</span> <span>$${data.payout.toFixed(2)}</span></div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <button class="${btnClass}" onclick="toggleStatus('${id}', '${data.status}')">${btnText}</button>
                        <div class="item-profit" style="color: ${profitColor}">${isPositive ? '+' : '-'}$${Math.abs(data.profit).toFixed(2)}</div>
                    </div>
                </div>
            `;
        });
    });

    // --- UPDATE STATUS IN FIREBASE ---
    window.toggleStatus = async function(id, currentStatus) {
        const newStatus = currentStatus === "In Hand" ? "Sold" : "In Hand";
        const cardRef = doc(db, "obsidian_cards", id);
        await updateDoc(cardRef, { status: newStatus });
    };

</script>
</body>
</html>
